<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Saver</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0d0d0f;
      --bg-secondary: #16161a;
      --bg-card: #1c1c21;
      --accent-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
      --accent-solid: #764ba2;
      --text-primary: #eeeeee;
      --text-secondary: #94949e;
      --text-muted: #5e5e6a;
      --border-color: rgba(255, 255, 255, 0.06);
      --success-bg: rgba(52, 211, 153, 0.12);
      --success-text: #34d399;
      --error-bg: rgba(248, 113, 113, 0.12);
      --error-text: #f87171;
      --warning-bg: rgba(251, 191, 36, 0.12);
      --warning-text: #fbbf24;
      --shadow-glow: 0 0 20px rgba(118, 75, 162, 0.2);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 340px;
      min-height: 200px;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      overflow: hidden;
    }

    .container {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: var(--accent-gradient);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: var(--shadow-glow);
    }

    .header-icon svg {
      width: 18px;
      height: 18px;
      fill: #fff;
    }

    .header-text h1 {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.3px;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-text p {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 1px;
    }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: var(--border-color);
    }

    /* ── Site Badge ── */
    .site-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 8px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      font-size: 12px;
      color: var(--text-secondary);
    }

    .site-badge .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .site-badge .dot.instagram { background: #e1306c; }
    .site-badge .dot.twitter { background: #1da1f2; }
    .site-badge .dot.unsupported { background: var(--text-muted); }

    .site-badge .site-name {
      font-weight: 600;
      color: var(--text-primary);
    }

    /* ── Download Button ── */
    #downloadBtn {
      position: relative;
      width: 100%;
      padding: 12px 16px;
      border: none;
      border-radius: 10px;
      background: var(--accent-gradient);
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.2px;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.25s ease, opacity 0.2s ease;
      box-shadow: 0 2px 12px rgba(118, 75, 162, 0.35);
      overflow: hidden;
    }

    #downloadBtn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(118, 75, 162, 0.5);
    }

    #downloadBtn:active:not(:disabled) {
      transform: translateY(0px);
    }

    #downloadBtn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #downloadBtn .btn-content {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      position: relative;
      z-index: 1;
    }

    #downloadBtn .btn-content svg {
      width: 15px;
      height: 15px;
      fill: #fff;
    }

    /* Shimmer effect */
    #downloadBtn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      transition: left 0.5s ease;
    }

    #downloadBtn:hover::before {
      left: 100%;
    }

    /* ── Spinner ── */
    .spinner {
      width: 15px;
      height: 15px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── Status ── */
    #status {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 500;
      line-height: 1.4;
      animation: fadeSlideIn 0.25s ease;
    }

    #status.success { display: flex; background: var(--success-bg); color: var(--success-text); }
    #status.error   { display: flex; background: var(--error-bg);   color: var(--error-text);   }
    #status.warning { display: flex; background: var(--warning-bg); color: var(--warning-text); }

    #status svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Footer ── */
    .footer {
      text-align: center;
      font-size: 10px;
      color: var(--text-muted);
      padding-top: 2px;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="header-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14.5v-9l6 4.5-6 4.5z"/></svg>
      </div>
      <div class="header-text">
        <h1>Video Saver</h1>
        <p>Instagram Reels &amp; X Videos</p>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Site Detection Badge -->
    <div class="site-badge" id="siteBadge">
      <span class="dot unsupported" id="siteDot"></span>
      <span>Detecting site…</span>
    </div>

    <!-- Action Button -->
    <button id="downloadBtn" disabled>
      <span class="btn-content">
        <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
        <span id="btnText">Find &amp; Download Video</span>
        <span class="spinner" id="spinner"></span>
      </span>
    </button>

    <!-- Manual Select Link -->
    <div id="manualSelectContainer" style="text-align: center; margin-top: -4px; display: none;">
      <a href="#" id="manualSelectLink" style="color: var(--text-secondary); font-size: 11px; text-decoration: underline; cursor: pointer; font-family: 'Inter', sans-serif;">
        Or select video manually
      </a>
    </div>

    <!-- Status Message -->
    <div id="status"></div>

    <!-- Footer -->
    <div class="footer">Click only on public Reels or X posts with video</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
